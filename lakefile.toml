name = "Limburg"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["Limburg"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
autoImplicit = false
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3
weak.linter.flexible = false
weak.linter.hashCommand = false

[[require]]
name = "mathlib"
scope = "leanprover-community"

[[require]]
name = "verso"
scope = "leanprover"
rev = "v4.30.0-rc1"

[[lean_lib]]
name = "Limburg"

[[lean_lib]]
name = "Site"
srcDir = "website"
roots = ["Site"]

[[lean_exe]]
name = "website"
srcDir = "website"
root = "Main"
supportInterpreter = true
